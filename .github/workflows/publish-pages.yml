# Statisk hjemmeside (docs/) → branchen gh-pages.
# GitHub: Settings → Pages → Source = "Deploy from a branch" → gh-pages → / (root)
#
# VIGTIGT (GitHub-dokumentation): Commits pushet af en workflow med GITHUB_TOKEN udløser
# IKKE automatisk en ny GitHub Pages-build for "branch"-kilde på samme måde som et menneskes push.
# Hvis gh-pages ikke opdaterer sitet: brug i stedet "main + /docs" ELLER sæt secret GH_PAGES_TOKEN
# (PAT med repo scope) herunder — så bruges PAT til push.
#
# Nemmeste uden PAT: Settings → Pages → Deploy from a branch → main → Folder /docs
#
# KRÆVER: Settings → Actions → General → Workflow permissions = "Read and write permissions"

name: Publish GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificer at docs/ findes
        run: |
          test -f docs/index.html || (echo "::error::docs/index.html mangler" && exit 1)
          ls -la docs

      - name: Push docs til gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN || secrets.GITHUB_TOKEN }}
          publish_dir: docs
          publish_branch: gh-pages
          force_orphan: true
          # Påkrævet for nogle repos ellers fejler git-commit i action
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: docs → gh-pages"
