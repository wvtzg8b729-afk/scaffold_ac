# Statisk hjemmeside (docs/) → branchen gh-pages.
# GitHub: Settings → Pages → Source = "Deploy from a branch" → gh-pages → / (root)
#
# Valgfri: Metode 0 i README bruger i stedet branch main + mappe /docs — ingen workflow.
#
# KRÆVER: Settings → Actions → General → Workflow permissions = "Read and write permissions"# (ellers kan GITHUB_TOKEN ikke pushe gh-pages).

name: Publish GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificer at docs/ findes
        run: |
          test -f docs/index.html || (echo "::error::docs/index.html mangler" && exit 1)
          ls -la docs

      - name: Push docs til gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
          publish_branch: gh-pages
          force_orphan: true
          # Påkrævet for nogle repos ellers fejler git-commit i action
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: docs → gh-pages"
