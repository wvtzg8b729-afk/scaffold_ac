# GitHub Pages med kilde "GitHub Actions" (anbefalet hvis du ikke bruger "main + /docs").
# Dokumentation: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site
#
# Vigtigt: upload-pages-artifact v4+ udelukker skjulte filer som standard — .nojekyll skal
# med for at slå Jekyll fra. Derfor v5 + include-hidden-files: true.
#
# Settings → Pages → Source: "GitHub Actions". Første kørsel: godkend miljøet "github-pages"
# eller slå Required reviewers fra under Settings → Environments → github-pages.

name: Deploy Pages (Actions-kilde)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-actions
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verificer publiceringsrod
        run: |
          test -f docs/index.html || (echo "::error::docs/index.html mangler — GitHub kræver index.html i publiceringsroden." && exit 1)
          test -f docs/.nojekyll || echo "::warning::docs/.nojekyll mangler — Jekyll kan ændre dit site uden denne fil."
          ls -la docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Eksplicit som i GitHubs skabelon — nogle org-defaults giver ellers fejl ved deploy-pages.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
