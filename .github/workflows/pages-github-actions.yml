# Bruges når: Settings → Pages → Source = "GitHub Actions"
# (Alternativ til publish-pages.yml som pusher til gh-pages-branchen.)
#
# Første kørsel: godkend evt. miljøet "github-pages" under Actions, eller
# Settings → Environments → github-pages → slå "Required reviewers" fra.

name: Deploy Pages (Actions-kilde)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-actions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
