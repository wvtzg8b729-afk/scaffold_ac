<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <base href="/scaffold_ac/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Siden findes ikke · Scaffold AC</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(600px 280px at 50% -10%, rgba(45, 212, 191, 0.15), transparent),
        linear-gradient(180deg, #07080c, #0e1118);
      color: #eef2f7;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      text-align: center;
      line-height: 1.6;
    }
    .box {
      max-width: 420px;
      padding: 2rem 1.5rem;
      border-radius: 16px;
      border: 1px solid #252d3d;
      background: rgba(21, 26, 36, 0.85);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; letter-spacing: -0.02em; }
    p { margin: 0 0 1rem; color: #9aa3b5; font-size: 1rem; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      color: #042f2e;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
    }
    a:hover { filter: brightness(1.06); }
    a:focus-visible { outline: 2px solid #5eead4; outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Denne sti findes ikke på det statiske site.</p>
    <a href="./">Til forsiden</a>
  </div>
</body>
</html>
